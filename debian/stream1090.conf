# stream1090 service configuration
# Adjust STREAM1090_OPTS for your hardware and sample rate.
# For RTL-SDR:   STREAM1090_OPTS="-s 2.4 -d /etc/stream1090/rtlsdr.ini"
# For Airspy:    STREAM1090_OPTS="-s 6 -d /etc/stream1090/airspy.ini"
# Add -u <rate> to enable upsampling, -q to enable IQ FIR filtering.
STREAM1090_OPTS="-s 2.4 -d /etc/stream1090/rtlsdr.ini"

# TCP port that readsb/dump1090-fa is listening on for raw input.
READSB_PORT=30001
